<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenebrae - D&D Text Game</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="double_algiz.png">
  <link href='https://fonts.googleapis.com/css?family=Cinzel Decorative' rel='stylesheet'>
</head>

<body>
  <div class="containeri">
    <div id="gamearea">
      <div id="details">
        <div id="stats-contain"><p id="health">&emsp;</p><p id="damage">&emsp;</p><p id="armor"></p></div>
        <p id="displaytext">This is example text. This is example text. This is
          example text.</p>
        <div class="justify-content-center mx-auto text-center">

          <p style="color: #171717;" id="gameresponse" class="text-center game-response">This is the game
            responding.</p>

          <div class="options-container">
            <p id="options" class="text-center option-title">What would you like to do?</p>
            <p id="option1" class="text-center">Option 1</p>
            <p id="option2" class="text-center">Option 2</p>
            <p id="option3" class="text-center">Option 3</p>
            <p id="option4" class="text-center">Option 4</p>
          </div>

          <input type="text" id="userInput" class="user-input" />
        </div>
      </div>
    </div>
  </div>
</body>
  <script src="game.js"></script>
</html>
